<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: rgb(15, 23, 42);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    #card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .icono {
      width: 56px;
      height: 56px;
      background: #EFF6FF;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px auto;
    }

    #card h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
    }

    #card p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 28px;
    }

    #inputCodigo {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      letter-spacing: 2px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    #inputCodigo:focus {
      border-color: #2563eb;
    }

    #inputCodigo.error {
      border-color: #ef4444;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    #btnIngresar {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #btnIngresar:hover:not(:disabled) {
      background: #1d4ed8;
    }

    #btnIngresar:active {
      transform: scale(0.98);
    }

    #btnIngresar:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    #mensaje {
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
      color: #ef4444;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div id="card">
    <div class="icono">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2C7.373 2 2 7.373 2 14C2 20.627 7.373 26 14 26C20.627 26 26 20.627 26 14C26 7.373 20.627 2 14 2ZM14 8C15.657 8 17 9.343 17 11C17 12.657 15.657 14 14 14C12.343 14 11 12.657 11 11C11 9.343 12.343 8 14 8ZM14 23C10.5 23 7.4 21.3 5.4 18.7C5.4 16 10 14.5 14 14.5C18 14.5 22.6 16 22.6 18.7C20.6 21.3 17.5 23 14 23Z" fill="#2563EB"/>
      </svg>
    </div>

    <h2>Acceso a la aplicación</h2>
    <p>Ingresá tu código de acceso para continuar</p>

    <input
      type="text"
      id="inputCodigo"
      placeholder="Código de acceso"
      autocomplete="off"
      spellcheck="false"
    />

    <button id="btnIngresar">Ingresar</button>

    <div id="mensaje"></div>
  </div>

<script>
  const FEATURE_LAYER_URL = "https://services4.arcgis.com/eJQLHpQ8KoQgBMSq/arcgis/rest/services/Claves/FeatureServer/0";
  const CAMPO_CODIGO = "Codigo";

  const input   = document.getElementById("inputCodigo");
  const btn     = document.getElementById("btnIngresar");
  const mensaje = document.getElementById("mensaje");

  async function validarCodigo() {
    const codigo = input.value.trim();

    if (!codigo) {
      mostrarError("Por favor ingresá un código.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Verificando...";
    mensaje.textContent = "";
    input.classList.remove("error");

    const codigoEscapado = codigo.replace(/'/g, "''");
    const where = `${CAMPO_CODIGO}='${codigoEscapado}'`;
    const params = new URLSearchParams({
      where,
      outFields: `${CAMPO_CODIGO},url`,
      returnGeometry: "false",
      f: "json"
    });

    try {
      const res  = await fetch(`${FEATURE_LAYER_URL}/query?${params}`);
      const data = await res.json();

      if (data.error) {
        mostrarError("Error al consultar la tabla. Revisá la URL.");
        console.error("ArcGIS error:", data.error);
        return;
      }

      if (data.features && data.features.length > 0) {
        const destino = data.features[0].attributes.url;
        if (destino) {
          window.location.href = destino;
        } else {
          mostrarError("Este código no tiene una URL asignada.");
        }
      } else {
        mostrarError("Código incorrecto. Intentá de nuevo.");
        input.classList.add("error");
        input.select();
      }

    } catch (err) {
      mostrarError("No se pudo conectar. Verificá tu conexión.");
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = "Ingresar";
    }
  }

  function mostrarError(texto) {
    mensaje.textContent = texto;
    input.classList.add("error");
    setTimeout(() => input.classList.remove("error"), 400);
  }

  btn.addEventListener("click", validarCodigo);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") validarCodigo();
  });
  window.addEventListener("load", () => input.focus());
</script>

</body>
</html>
